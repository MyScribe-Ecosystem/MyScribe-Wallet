name: Sync upstream OP_WALLET

on:
  schedule:
    # Check for upstream changes daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout MyScribe-Wallet
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/btc-vision/opwallet.git || true
          git fetch upstream master

      - name: Check for new upstream commits
        id: check
        run: |
          UPSTREAM_HEAD=$(git rev-parse upstream/master)
          # Find the merge base between our master and upstream
          MERGE_BASE=$(git merge-base HEAD upstream/master 2>/dev/null || echo "none")
          if [ "$MERGE_BASE" = "$UPSTREAM_HEAD" ]; then
            echo "already_synced=true" >> "$GITHUB_OUTPUT"
            echo "✅ Already up to date with upstream"
          else
            echo "already_synced=false" >> "$GITHUB_OUTPUT"
            NEW_COMMITS=$(git log --oneline "$MERGE_BASE..upstream/master" | wc -l | tr -d ' ')
            echo "new_commits=$NEW_COMMITS" >> "$GITHUB_OUTPUT"
            echo "🔄 $NEW_COMMITS new upstream commits to merge"
          fi

      - name: Create sync branch and merge
        if: steps.check.outputs.already_synced == 'false'
        id: merge
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"

          # Attempt the merge
          if git merge upstream/master --no-edit -m "Merge upstream OP_WALLET changes"; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            # Abort the failed merge so the branch is clean for the PR
            git merge --abort
            # Still create the branch so maintainer can resolve manually
            git checkout -b "${BRANCH}-needs-rebase"
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          git push origin "$BRANCH"

      - name: Create Pull Request (clean merge)
        if: steps.check.outputs.already_synced == 'false' && steps.merge.outputs.conflict == 'false'
        run: |
          gh pr create \
            --title "⬆️ Sync upstream OP_WALLET (${{ steps.check.outputs.new_commits }} commits)" \
            --body "$(cat <<'BODY'
          ## Automated upstream sync

          This PR merges the latest changes from [btc-vision/opwallet](https://github.com/btc-vision/opwallet) into MyScribe Wallet.

          **${{ steps.check.outputs.new_commits }}** new upstream commit(s) merged cleanly.

          ### Review checklist
          - [ ] MyScribe UI customizations still intact
          - [ ] Ordinals tab still working
          - [ ] Build succeeds (`npm run build:chrome`)

          🤖 Generated by [sync-upstream](/.github/workflows/sync-upstream.yml) workflow
          BODY
          )" \
            --base master \
            --head "${{ steps.merge.outputs.branch }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Issue (merge conflict)
        if: steps.check.outputs.already_synced == 'false' && steps.merge.outputs.conflict == 'true'
        run: |
          gh issue create \
            --title "⚠️ Upstream sync needs manual merge" \
            --body "$(cat <<'BODY'
          The daily upstream sync from [btc-vision/opwallet](https://github.com/btc-vision/opwallet) has merge conflicts that need manual resolution.

          **${{ steps.check.outputs.new_commits }}** new upstream commits.

          ### To resolve:
          ```bash
          git fetch upstream master
          git checkout -b sync/manual-$(date +%Y%m%d)
          git merge upstream/master
          # Resolve conflicts, keeping MyScribe customizations
          git push origin HEAD
          # Create PR
          ```

          🤖 Generated by [sync-upstream](/.github/workflows/sync-upstream.yml) workflow
          BODY
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
